worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ─── Marketplace Load Balancer ──────────────────────────────────
  upstream marketplace_backend {
    least_conn;
    server marketplace-service-1:3002;
    server marketplace-service-2:3002;
    keepalive 32;
  }

  # ─── Main Server ────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Health check
    location /health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }

    # API Gateway – all /api/* traffic
    location /api/ {
      proxy_pass http://api-gateway:3000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";
      proxy_connect_timeout 60s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    # Marketplace direct load-balanced path (used by gateway)
    location /marketplace/ {
      rewrite ^/marketplace/(.*)$ /$1 break;
      proxy_pass http://marketplace_backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header Connection        "";
    }

    # Static uploads
    location /uploads/ {
      proxy_pass http://marketplace-service-1:3002/uploads/;
    }

    # Frontend (React SPA)
    location / {
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
